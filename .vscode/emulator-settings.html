<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ASL Watch Face Settings</title>
  <style>
    body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; background: #f0f0f0; }
    h2 { color: #333; margin-bottom: 20px; }
    .setting { background: #fff; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .setting label { display: block; font-weight: bold; margin-bottom: 8px; color: #555; }
    input[type=color] { width: 100%; height: 44px; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; padding: 2px; }
    select { width: 100%; height: 44px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; padding: 0 8px; }
    button { display: block; width: 100%; padding: 16px; margin-top: 20px; background: #4CAF50; color: #fff; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>ASL Watch Face Settings</h2>

  <div class="setting">
    <label for="bg">Background Color</label>
    <input type="color" id="bg" value="#000000">
  </div>

  <div class="setting">
    <label for="time">Time Color</label>
    <input type="color" id="time" value="#ffffff">
  </div>

  <div class="setting">
    <label for="info">Info Color</label>
    <input type="color" id="info" value="#aaaaaa">
  </div>

  <div class="setting">
    <label for="font">Font</label>
    <select id="font">
      <option value="0" selected>American Sign Language</option>
      <option value="1">Dissaramas Fingerspelling</option>
    </select>
  </div>

  <button type="button" onclick="save()">Save Settings</button>

  <script>
    function save() {
      var d = {
        SETTING_BG_COLOR: document.getElementById('bg').value,
        SETTING_TIME_COLOR: document.getElementById('time').value,
        SETTING_INFO_COLOR: document.getElementById('info').value,
        SETTING_FONT_CHOICE: document.getElementById('font').value
      };

      var encoded = encodeURIComponent(JSON.stringify(d));
      var paramSource = (window.location.search || '') + '&' + (window.location.hash || '').replace(/^#/, '');
      var match = /(?:^|[?&#])return_to=([^&]*)/.exec(paramSource);
      if (match && match[1]) {
        // Desktop browser flow used by emulator tooling.
        var returnTo = decodeURIComponent(match[1]);
        window.location.href = returnTo + encoded;
        return;
      }

      // Fallback when opened directly in a desktop browser.
      localStorage.setItem('aslWatchFaceSettingsPreview', JSON.stringify(d));
      alert('Settings page opened in standalone mode. Values were saved locally in this browser, but Pebble emulator sync is unavailable in the current CLI session.');
    }
  </script>
</body>
</html>

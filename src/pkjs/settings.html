<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASL Watch Face Settings</title>
  <style>
    :root {
      --bg: #f0f0f0;
      --panel: #ffffff;
      --text: #333333;
      --label: #555555;
      --border: #dddddd;
      --accent: #4caf50;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h2 {
      margin: 0 0 20px;
    }

    .setting {
      background: var(--panel);
      border-radius: 8px;
      padding: 15px;
      margin: 10px 0;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--label);
      font-weight: 600;
    }

    input[type="color"],
    select {
      width: 100%;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 16px;
      padding: 0 8px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #ffffff;
      font-size: 18px;
      padding: 14px 16px;
      cursor: pointer;
    }

    pre {
      background: #111111;
      color: #d7f8cf;
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      margin-top: 16px;
      min-height: 48px;
    }
  </style>
</head>
<body>
  <h2>ASL Watch Face Settings</h2>

  <div class="setting">
    <label for="bg">Background Color</label>
    <input type="color" id="bg" value="#000000">
  </div>

  <div class="setting">
    <label for="time">Time Color</label>
    <input type="color" id="time" value="#ffffff">
  </div>

  <div class="setting">
    <label for="info">Info Color</label>
    <input type="color" id="info" value="#aaaaaa">
  </div>

  <div class="setting">
    <label for="font">Font</label>
    <select id="font">
      <option value="0">American Sign Language</option>
      <option value="1">Dissaramas Fingerspelling</option>
    </select>
  </div>

  <button id="saveBtn" type="button">Save Settings (Local Preview)</button>
  <pre id="output">Saved settings payload will appear here.</pre>

  <script>
    (function () {
      var STORAGE_KEY = 'aslWatchFaceSettings';

      function loadSettings() {
        try {
          return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
        } catch (e) {
          return {};
        }
      }

      function writeToForm(settings) {
        document.getElementById('bg').value = settings.SETTING_BG_COLOR || '#000000';
        document.getElementById('time').value = settings.SETTING_TIME_COLOR || '#ffffff';
        document.getElementById('info').value = settings.SETTING_INFO_COLOR || '#aaaaaa';
        document.getElementById('font').value = String(settings.SETTING_FONT_CHOICE || '0');
      }

      function readFromForm() {
        return {
          SETTING_BG_COLOR: document.getElementById('bg').value,
          SETTING_TIME_COLOR: document.getElementById('time').value,
          SETTING_INFO_COLOR: document.getElementById('info').value,
          SETTING_FONT_CHOICE: document.getElementById('font').value
        };
      }

      function saveLocalPreview() {
        var payload = readFromForm();
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
        document.getElementById('output').textContent = JSON.stringify(payload, null, 2);
      }

      writeToForm(loadSettings());
      document.getElementById('saveBtn').addEventListener('click', saveLocalPreview);
    })();
  </script>
</body>
</html>
